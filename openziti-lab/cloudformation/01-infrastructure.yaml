AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OpenZiti Zero Trust Networking Lab
  Deploys a Ziti controller/router, a private app server, and a client instance

Parameters:
  EnvironmentName:
    Type: String
    Default: ziti-lab
    Description: Environment name prefix for resources

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64

Resources:
  # ============================================
  # VPC & Networking
  # ============================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnet — for Ziti controller and client
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public

  # Private subnet — for the app server (no internet, no public IP)
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-rt

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # NAT Gateway so private subnet can pull packages during setup
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-nat

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # ============================================
  # Security Groups
  # ============================================

  # Ziti Controller/Router — needs Ziti ports + SSH
  ZitiControllerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: OpenZiti Controller and Edge Router
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 8440
          ToPort: 8443
          CidrIp: 0.0.0.0/0
          Description: Ziti Controller + Router + ZAC (8440-8443)
        - IpProtocol: tcp
          FromPort: 10080
          ToPort: 10080
          CidrIp: 0.0.0.0/0
          Description: Ziti Router Link Listener
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ziti-controller-sg

  # App Server — only accessible from within VPC (private)
  AppServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Private App Server - internal access only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref ZitiControllerSG
          Description: SSH from Ziti Controller only (jump host)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.2.0/24
          Description: HTTP from private subnet only
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.2.0/24
          Description: HTTPS from private subnet only
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-sg

  # Client instance — SSH only
  ClientSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Client workstation
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-client-sg

  # ============================================
  # IAM Role (shared by all instances for SSM)
  # ============================================
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-instance-role

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ============================================
  # EC2: OpenZiti Controller + Edge Router
  # ============================================
  ZitiController:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref ZitiControllerSG
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          exec > /var/log/ziti-setup.log 2>&1

          echo "=== OpenZiti Controller Setup ==="
          yum update -y
          yum install -y jq tar wget

          # The expressInstall will be run manually by the student
          # We just prepare the environment here
          echo "OpenZiti controller instance ready for setup" > /home/ec2-user/READY.txt
          echo "Run the expressInstall as ec2-user to set up the Ziti network" >> /home/ec2-user/READY.txt
          chown ec2-user:ec2-user /home/ec2-user/READY.txt

          echo "=== Setup complete ==="
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ziti-controller
        - Key: Role
          Value: ziti-controller

  # ============================================
  # EC2: Private Application Server
  # ============================================
  AppServer:
    Type: AWS::EC2::Instance
    DependsOn: PrivateRoute
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref AppServerSG
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > /var/log/app-setup.log 2>&1

          echo "=== Private App Server Setup ==="
          yum update -y
          yum install -y httpd jq

          systemctl start httpd
          systemctl enable httpd

          # Create a "secret" internal app — only reachable through Ziti
          echo '<html><head><title>SecureVault - Internal Portal</title><style>body{background:#1a237e;color:white;text-align:center;font-family:Arial;padding:50px}table{margin:auto;text-align:left;color:white;border-collapse:collapse}td{padding:8px 16px}tr:nth-child(even){background:rgba(255,255,255,0.1)}.warn{color:#ff9800;font-weight:bold}.ok{color:#4caf50;font-weight:bold}</style></head><body><h1>SecureVault Internal Portal</h1><p class="warn">CONFIDENTIAL — Zero Trust Access Only</p><hr><h2>System Info</h2><table><tr><td>Hostname:</td><td>'$(hostname)'</td></tr><tr><td>Private IP:</td><td>'$(hostname -I | awk "{print \$1}")'</td></tr><tr><td>Region:</td><td>${AWS::Region}</td></tr><tr><td>Access Method:</td><td class="ok">OpenZiti Overlay</td></tr></table><hr><h3>Internal API Endpoints</h3><table><tr><td><code>/api/secrets</code></td><td>Retrieve secrets</td></tr><tr><td><code>/api/health</code></td><td>Health check</td></tr></table><hr><p style="font-size:12px">This server has NO public IP. If you can see this page, you are connected through the OpenZiti zero trust network.</p></body></html>' > /var/www/html/index.html

          mkdir -p /var/www/html/api

          echo '{"status":"healthy","service":"securevault","access":"openziti-overlay","private_ip":"'$(hostname -I | awk '{print $1}')'"}'  > /var/www/html/api/health

          echo '{"secrets":[{"id":"SEC-001","name":"db-password","created":"2026-01-15"},{"id":"SEC-002","name":"api-key-prod","created":"2026-02-01"},{"id":"SEC-003","name":"tls-cert-internal","created":"2026-02-10"}],"total":3,"access_method":"zero-trust"}' > /var/www/html/api/secrets

          echo "=== App Server Setup Complete ==="
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app-server
        - Key: Role
          Value: private-app

  # ============================================
  # EC2: Client Workstation
  # ============================================
  ClientInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref ClientSG
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          exec > /var/log/client-setup.log 2>&1

          echo "=== Client Workstation Setup ==="
          yum update -y
          yum install -y jq curl

          echo "Client workstation ready" > /home/ec2-user/READY.txt
          echo "Install the Ziti tunneler to access private services" >> /home/ec2-user/READY.txt
          chown ec2-user:ec2-user /home/ec2-user/READY.txt

          echo "=== Client Setup Complete ==="
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-client
        - Key: Role
          Value: ziti-client

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  ZitiControllerPublicIP:
    Description: Ziti Controller Public IP
    Value: !GetAtt ZitiController.PublicIp

  ZitiControllerInstanceId:
    Description: Ziti Controller Instance ID
    Value: !Ref ZitiController

  AppServerPrivateIP:
    Description: App Server Private IP (no public access)
    Value: !GetAtt AppServer.PrivateIp

  AppServerInstanceId:
    Description: App Server Instance ID
    Value: !Ref AppServer

  ClientPublicIP:
    Description: Client Workstation Public IP
    Value: !GetAtt ClientInstance.PublicIp

  ClientInstanceId:
    Description: Client Instance ID
    Value: !Ref ClientInstance
