AWSTemplateFormatVersion: '2010-09-09'
Description: 'RAG and Agents Demo Infrastructure - AWS Bedrock, S3, DynamoDB, Lambda'

Parameters:
  ProjectName:
    Type: String
    Default: rag-agents-demo
    Description: Project name for resource naming

Resources:
  # S3 Bucket for document storage
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-documents-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # DynamoDB table for conversation history
  ConversationHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-conversations'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conversation_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: conversation_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # DynamoDB table for vector embeddings metadata
  EmbeddingsMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-embeddings-metadata'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: chunk_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
        - AttributeName: chunk_id
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # IAM Role for Lambda functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentBucket.Arn
                  - !Sub '${DocumentBucket.Arn}/*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ConversationHistoryTable.Arn
                  - !GetAtt EmbeddingsMetadataTable.Arn

  # Lambda Layer for dependencies
  PythonDependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub '${ProjectName}-dependencies'
      Description: Python dependencies for RAG and Agents
      Content:
        S3Bucket: !Ref DocumentBucket
        S3Key: layers/dependencies.zip
      CompatibleRuntimes:
        - python3.11
        - python3.12

  # Lambda function for RAG queries
  RAGQueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-rag-query'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          DOCUMENT_BUCKET: !Ref DocumentBucket
          CONVERSATION_TABLE: !Ref ConversationHistoryTable
          EMBEDDINGS_TABLE: !Ref EmbeddingsMetadataTable
          EMBEDDING_MODEL: amazon.titan-embed-text-v1
          LLM_MODEL: anthropic.claude-3-sonnet-20240229-v1:0
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          
          def lambda_handler(event, context):
              # Placeholder - replace with actual RAG implementation
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'RAG function placeholder',
                      'query': event.get('query', '')
                  })
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Lambda function for Agent execution
  AgentExecutionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-agent-execution'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          DOCUMENT_BUCKET: !Ref DocumentBucket
          CONVERSATION_TABLE: !Ref ConversationHistoryTable
          LLM_MODEL: anthropic.claude-3-sonnet-20240229-v1:0
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          
          def lambda_handler(event, context):
              # Placeholder - replace with actual Agent implementation
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Agent function placeholder',
                      'task': event.get('task', '')
                  })
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # CloudWatch Log Groups
  RAGQueryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${RAGQueryFunction}'
      RetentionInDays: 7

  AgentExecutionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AgentExecutionFunction}'
      RetentionInDays: 7

Outputs:
  DocumentBucketName:
    Description: S3 bucket for document storage
    Value: !Ref DocumentBucket
    Export:
      Name: !Sub '${ProjectName}-document-bucket'

  ConversationTableName:
    Description: DynamoDB table for conversation history
    Value: !Ref ConversationHistoryTable
    Export:
      Name: !Sub '${ProjectName}-conversation-table'

  EmbeddingsTableName:
    Description: DynamoDB table for embeddings metadata
    Value: !Ref EmbeddingsMetadataTable
    Export:
      Name: !Sub '${ProjectName}-embeddings-table'

  RAGQueryFunctionArn:
    Description: ARN of RAG query Lambda function
    Value: !GetAtt RAGQueryFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-rag-function-arn'

  AgentExecutionFunctionArn:
    Description: ARN of Agent execution Lambda function
    Value: !GetAtt AgentExecutionFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-agent-function-arn'

  LambdaExecutionRoleArn:
    Description: IAM role for Lambda functions
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${ProjectName}-lambda-role-arn'
