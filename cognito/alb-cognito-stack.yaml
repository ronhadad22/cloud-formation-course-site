AWSTemplateFormatVersion: '2010-09-09'
Description: 'ALB with Cognito Authentication for Backend API'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where ALB will be deployed'
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'At least 2 public subnets in different AZs'
  
  UserPoolId:
    Type: String
    Default: 'us-east-1_ZWzVtGG7c'
    Description: 'Cognito User Pool ID'
  
  UserPoolDomain:
    Type: String
    Description: 'Cognito User Pool Domain (e.g., myapp-12345)'
  
  CertificateArn:
    Type: String
    Description: 'ACM Certificate ARN for HTTPS listener'
    Default: 'arn:aws:acm:us-east-1:950555670656:certificate/3f8e0aec-3278-4d36-8bd2-be0afdef7fa2'
  
  BackendInstanceId:
    Type: String
    Description: 'EC2 Instance ID running the backend (optional, leave empty for target group only)'
    Default: ''

Conditions:
  HasBackendInstance: !Not [!Equals [!Ref BackendInstanceId, '']]

Resources:
  ALBUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${AWS::StackName}-ALB-Client'
      UserPoolId: !Ref UserPoolId
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub 'https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse'
      SupportedIdentityProviders:
        - COGNITO
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-ALB-SG'
      GroupDescription: 'Security group for ALB'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: 'HTTP from internet'
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: 'HTTPS from internet'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ALB-SG'

  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-Backend-SG'
      GroupDescription: 'Security group for backend instances'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: 'Allow traffic from ALB only'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Backend-SG'

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-ALB'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ALB'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-TG'
      Port: 3001
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetType: instance
      Targets: !If
        - HasBackendInstance
        - - Id: !Ref BackendInstanceId
            Port: 3001
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-TG'

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: authenticate-cognito
          AuthenticateCognitoConfig:
            UserPoolArn: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'
            UserPoolClientId: !Ref ALBUserPoolClient
            UserPoolDomain: !Ref UserPoolDomain
            OnUnauthenticatedRequest: authenticate
            Scope: 'openid'
            SessionCookieName: 'AWSELBAuthSessionCookie'
            SessionTimeout: 3600
          Order: 1
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
          Order: 2

Outputs:
  LoadBalancerDNS:
    Description: 'ALB DNS Name'
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALB-DNS'

  LoadBalancerURL:
    Description: 'ALB URL (HTTPS with Cognito Auth)'
    Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}'
    Export:
      Name: !Sub '${AWS::StackName}-ALB-URL'

  TargetGroupArn:
    Description: 'Target Group ARN'
    Value: !Ref TargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-TG-ARN'

  BackendSecurityGroupId:
    Description: 'Backend Security Group ID (attach to your EC2 instances)'
    Value: !Ref BackendSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-Backend-SG-ID'

  UserPoolClientId:
    Description: 'ALB User Pool Client ID'
    Value: !Ref ALBUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  CognitoHostedUIURL:
    Description: 'Cognito Hosted UI Login URL'
    Value: !Sub 'https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${ALBUserPoolClient}&response_type=code&redirect_uri=https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse'
