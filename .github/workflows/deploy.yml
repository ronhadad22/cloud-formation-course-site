name: CI/CD Pipeline - Build, Push & Deploy

on:
  push:
    branches: [cicd-lab]
    paths:
      - 'cicd-lab/app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version tag (e.g. 1.2.0)'
        required: false
        default: ''

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: cicd-lab-app

jobs:
  # ============================================================
  # Job 1: Build & Push Docker image to ECR
  # ============================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION"
          IMAGE_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "🔨 Building image: $IMAGE"
          docker build \
            --build-arg APP_VERSION=$VERSION \
            -t $IMAGE \
            -t $IMAGE_LATEST \
            ./cicd-lab/app

          echo "📤 Pushing to ECR..."
          docker push $IMAGE
          docker push $IMAGE_LATEST

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $IMAGE"

  # ============================================================
  # Job 2: Deploy to EC2
  # ============================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm-deploy
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          echo "🚀 Deploying $IMAGE to $INSTANCE_ID via SSM..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/home/ec2-user/deploy.sh $IMAGE']" \
            --timeout-seconds 120 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "📨 SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          echo "⏳ Waiting for deployment to finish..."
          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ SSM command completed successfully"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ SSM command failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            echo "⏳ Status: $STATUS — waiting 5s... ($i/24)"
            sleep 5
          done

      - name: Health check
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)

          echo "⏳ Waiting for app to start on $EC2_IP..."
          sleep 5

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 \
              "http://$EC2_IP/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              curl -s "http://$EC2_IP/api/health" | jq .
              exit 0
            fi
            echo "⏳ Attempt $i: HTTP $HTTP_CODE — retrying in 5s..."
            sleep 5
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)

          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-and-push.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ needs.build-and-push.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | http://$EC2_IP |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
