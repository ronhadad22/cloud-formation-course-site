name: Build and Deploy

on:
  push:
    branches: [cicd-lab]
    paths:
      - 'cicd-lab/app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO: cicd-lab-app

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: build
        run: |
          VERSION="1.0.${{ github.run_number }}"
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:$VERSION"

          docker build --build-arg APP_VERSION=$VERSION -t $IMAGE ./cicd-lab/app
          docker push $IMAGE

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/home/ec2-user/deploy.sh ${{ needs.build-and-push.outputs.image }}']" \
            --query 'Command.CommandId' --output text)

          # Wait for deploy to finish
          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            [ "$STATUS" = "Success" ] && echo "Deploy done!" && exit 0
            [ "$STATUS" = "Failed" ] && echo "Deploy failed!" && exit 1
            sleep 5
          done
          echo "Timeout" && exit 1

      - name: Health check
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)

          sleep 5
          curl -sf "http://$IP/api/health" | jq .
