AWSTemplateFormatVersion: '2010-09-09'
Description: 'Source Server Simulator - Creates a server to practice MGN migration'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'MGN-Demo'
    Description: 'Environment name prefix'

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: 'EC2 Key Pair for SSH access'

  InstanceType:
    Type: String
    Default: 't3.micro'
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: 'EC2 instance type for source server'

  SourceVPCCIDR:
    Type: String
    Default: '172.16.0.0/16'
    Description: 'CIDR block for source VPC (simulating on-premises)'

  SourceSubnetCIDR:
    Type: String
    Default: '172.16.1.0/24'
    Description: 'CIDR block for source subnet'

Resources:
  # Simulate "On-Premises" VPC
  SourceVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref SourceVPCCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-VPC'

  SourceInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-IGW'

  AttachSourceGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SourceVPC
      InternetGatewayId: !Ref SourceInternetGateway

  SourceSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SourceVPC
      CidrBlock: !Ref SourceSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-Subnet'

  SourceRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SourceVPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-RT'

  SourceDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachSourceGateway
    Properties:
      RouteTableId: !Ref SourceRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref SourceInternetGateway

  SourceSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SourceSubnet
      RouteTableId: !Ref SourceRouteTable

  # Security Group for Source Server
  SourceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-Source-SG'
      GroupDescription: 'Security group for source server'
      VpcId: !Ref SourceVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: 'SSH access'
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: 'HTTP access'
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: 'HTTPS for MGN agent'
        - IpProtocol: tcp
          FromPort: 1500
          ToPort: 1500
          CidrIp: 0.0.0.0/0
          Description: 'MGN replication port'
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: 'Allow all outbound'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-SG'

  # Source Server with sample application
  SourceServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SourceSubnet
      SecurityGroupIds:
        - !Ref SourceSecurityGroup
      IamInstanceProfile: !Ref SourceServerInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Update system
          yum update -y
          
          # Install Apache web server
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          
          # Create a sample web application
          cat > /var/www/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Source Server - MGN Demo</title>
              <style>
                  body {
                      font-family: Arial, sans-serif;
                      max-width: 800px;
                      margin: 50px auto;
                      padding: 20px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                  }
                  .container {
                      background: rgba(255, 255, 255, 0.1);
                      padding: 30px;
                      border-radius: 10px;
                      backdrop-filter: blur(10px);
                  }
                  h1 { color: #fff; }
                  .info { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 5px; margin: 10px 0; }
                  .status { color: #4ade80; font-weight: bold; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🖥️ Source Server - AWS MGN Demo</h1>
                  <div class="info">
                      <p><strong>Server Type:</strong> Source Server (Simulated On-Premises)</p>
                      <p><strong>Status:</strong> <span class="status">Running</span></p>
                      <p><strong>Hostname:</strong> <span id="hostname">Loading...</span></p>
                      <p><strong>IP Address:</strong> <span id="ip">Loading...</span></p>
                      <p><strong>Purpose:</strong> This server simulates an on-premises server for MGN migration demo</p>
                  </div>
                  <h2>📋 Next Steps:</h2>
                  <ol>
                      <li>SSH to this server</li>
                      <li>Install MGN replication agent</li>
                      <li>Monitor replication progress</li>
                      <li>Test the migrated instance</li>
                      <li>Perform cutover</li>
                  </ol>
                  <p><em>After successful migration, you should see this same page on the target instance!</em></p>
              </div>
              <script>
                  fetch('/api/info')
                      .then(r => r.json())
                      .then(data => {
                          document.getElementById('hostname').textContent = data.hostname;
                          document.getElementById('ip').textContent = data.ip;
                      })
                      .catch(() => {
                          document.getElementById('hostname').textContent = 'N/A';
                          document.getElementById('ip').textContent = 'N/A';
                      });
              </script>
          </body>
          </html>
          EOF
          
          # Create a simple API endpoint
          mkdir -p /var/www/html/api
          cat > /var/www/html/api/info << 'EOF'
          #!/bin/bash
          echo "Content-type: application/json"
          echo ""
          echo "{"
          echo "  \"hostname\": \"$(hostname)\","
          echo "  \"ip\": \"$(hostname -I | awk '{print $1}')\","
          echo "  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
          echo "}"
          EOF
          chmod +x /var/www/html/api/info
          
          # Configure Apache for CGI
          cat >> /etc/httpd/conf/httpd.conf << 'EOF'
          
          <Directory "/var/www/html/api">
              Options +ExecCGI
              AddHandler cgi-script .cgi
              SetHandler cgi-script
          </Directory>
          EOF
          
          systemctl restart httpd
          
          # Create MGN agent installation helper script
          cat > /home/ec2-user/install-mgn-agent.sh << 'EOFSCRIPT'
          #!/bin/bash
          echo "=== MGN Agent Installation Helper ==="
          echo ""
          echo "1. Download the MGN agent installer:"
          echo "   wget -O ./aws-replication-installer-init.py https://aws-application-migration-service-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/linux/aws-replication-installer-init.py"
          echo ""
          echo "2. Run the installer (you'll need AWS credentials):"
          echo "   sudo python3 aws-replication-installer-init.py --region ${AWS::Region}"
          echo ""
          echo "3. Or use IAM role (if configured):"
          echo "   sudo python3 aws-replication-installer-init.py --region ${AWS::Region} --no-prompt"
          echo ""
          echo "For more details, see: /home/ec2-user/mgn-instructions.txt"
          EOFSCRIPT
          chmod +x /home/ec2-user/install-mgn-agent.sh
          
          # Create detailed instructions
          cat > /home/ec2-user/mgn-instructions.txt << 'EOFINST'
          ========================================
          AWS MGN Agent Installation Instructions
          ========================================
          
          This server is ready to be migrated using AWS Application Migration Service (MGN).
          
          STEP 1: Initialize MGN Service (if not done)
          ---------------------------------------------
          From your workstation:
          aws mgn initialize-service --region ${AWS::Region}
          
          STEP 2: Download MGN Agent
          ---------------------------
          wget -O ./aws-replication-installer-init.py \
            https://aws-application-migration-service-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/linux/aws-replication-installer-init.py
          
          STEP 3: Install MGN Agent
          --------------------------
          Option A - Using IAM credentials:
          sudo python3 aws-replication-installer-init.py \
            --region ${AWS::Region} \
            --aws-access-key-id YOUR_ACCESS_KEY \
            --aws-secret-access-key YOUR_SECRET_KEY
          
          Option B - Using IAM role (if attached):
          sudo python3 aws-replication-installer-init.py \
            --region ${AWS::Region} \
            --no-prompt
          
          STEP 4: Monitor Replication
          ----------------------------
          Check replication status:
          aws mgn describe-source-servers --region ${AWS::Region}
          
          STEP 5: Test Migration
          ----------------------
          Launch test instance from MGN console
          
          STEP 6: Cutover
          ---------------
          When ready, perform cutover from MGN console
          
          VERIFICATION:
          After migration, access the target instance and verify:
          - Web application is accessible
          - All data is present
          - Application functions correctly
          
          ========================================
          EOFINST
          chown ec2-user:ec2-user /home/ec2-user/*
          
          # Create sample data to verify migration
          mkdir -p /opt/sample-data
          echo "This is sample data created on $(date)" > /opt/sample-data/test-file.txt
          echo "Migration timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /opt/sample-data/migration-marker.txt
          
          # Log completion
          echo "Source server setup completed at $(date)" >> /var/log/user-data.log
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-Server'
        - Key: Environment
          Value: 'Source'
        - Key: MigrationReady
          Value: 'true'

  # IAM Role for Source Server
  SourceServerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-Source-Server-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Source-Server-Role'

  SourceServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${EnvironmentName}-Source-Server-Profile'
      Roles:
        - !Ref SourceServerRole

Outputs:
  SourceServerInstanceId:
    Description: 'Source Server Instance ID'
    Value: !Ref SourceServer
    Export:
      Name: !Sub '${AWS::StackName}-Instance-ID'

  SourceServerPublicIP:
    Description: 'Source Server Public IP'
    Value: !GetAtt SourceServer.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-Public-IP'

  SourceServerPrivateIP:
    Description: 'Source Server Private IP'
    Value: !GetAtt SourceServer.PrivateIp
    Export:
      Name: !Sub '${AWS::StackName}-Private-IP'

  WebApplicationURL:
    Description: 'Web Application URL'
    Value: !Sub 'http://${SourceServer.PublicIp}'

  SSHCommand:
    Description: 'SSH Command to connect to source server'
    Value: !Sub 'ssh -i your-key.pem ec2-user@${SourceServer.PublicIp}'

  MGNAgentInstallCommand:
    Description: 'Command to run on source server to see installation instructions'
    Value: 'cat /home/ec2-user/mgn-instructions.txt'

  NextSteps:
    Description: 'Next steps for MGN migration'
    Value: |
      1. SSH to the source server
      2. Run: ./install-mgn-agent.sh
      3. Follow the instructions to install MGN agent
      4. Monitor replication in MGN console
      5. Test and cutover when ready
