---
- name: Configure Web Server
  hosts: webservers
  become: yes
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
    
    - name: Install nginx
      apt:
        name: nginx
        state: present
      when: ansible_os_family == "Debian"
    
    - name: Start and enable nginx service
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: Display success message
      debug:
        msg: "Nginx has been successfully installed and started on {{ inventory_hostname }}"
