---
- name: Complete Web Server Setup
  hosts: webservers
  become: yes
  
  vars:
    app_user: www-data
    app_directory: /var/www/myapp
    packages:
      - nginx
      - git
      - curl
      - vim
  
  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags:
        - packages
    
    - name: Install required packages
      apt:
        name: "{{ packages }}"
        state: present
      tags:
        - packages
    
    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'
      tags:
        - filesystem
    
    - name: Copy nginx configuration
      copy:
        content: |
          server {
              listen 80;
              server_name {{ inventory_hostname }};
              root {{ app_directory }};
              index index.html;
              
              location / {
                  try_files $uri $uri/ =404;
              }
          }
        dest: /etc/nginx/sites-available/myapp
        owner: root
        group: root
        mode: '0644'
      notify: Restart nginx
      tags:
        - configuration
    
    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/myapp
        dest: /etc/nginx/sites-enabled/myapp
        state: link
      notify: Restart nginx
      tags:
        - configuration
    
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart nginx
      tags:
        - configuration
    
    - name: Create sample index.html
      copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Welcome to {{ inventory_hostname }}</title>
          </head>
          <body>
              <h1>Success! Ansible deployed this page.</h1>
              <p>Server: {{ inventory_hostname }}</p>
              <p>Environment: {{ env | default('unknown') }}</p>
          </body>
          </html>
        dest: "{{ app_directory }}/index.html"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
      tags:
        - content
    
    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes
      tags:
        - service
    
    - name: Display deployment information
      debug:
        msg:
          - "Deployment completed successfully!"
          - "Server: {{ inventory_hostname }}"
          - "App Directory: {{ app_directory }}"
          - "Access URL: http://{{ ansible_default_ipv4.address }}"
      tags:
        - info
  
  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
