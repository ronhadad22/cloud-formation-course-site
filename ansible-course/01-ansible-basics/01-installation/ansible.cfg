# Ansible Configuration File
# This is a basic ansible.cfg for learning purposes

[defaults]
# Inventory file location
inventory = ./inventory.ini

# Disable host key checking (only for lab environments)
host_key_checking = False

# Number of parallel processes
forks = 5

# Default remote user
remote_user = ubuntu

# Privilege escalation settings
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# SSH timeout
timeout = 10

# Retry files (disabled for cleaner workspace)
retry_files_enabled = False

# Display skipped hosts
display_skipped_hosts = True

# Callback plugins for better output
stdout_callback = yaml
bin_ansible_callbacks = True

# Gathering facts
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# SSH arguments
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# Pipelining improves performance
pipelining = True
