---
- name: Service Management Examples
  hosts: all
  become: yes
  
  tasks:
    # Service Module - Manage services
    - name: Start a service
      service:
        name: nginx
        state: started
    
    - name: Stop a service
      service:
        name: nginx
        state: stopped
    
    - name: Restart a service
      service:
        name: nginx
        state: restarted
    
    - name: Reload a service (without full restart)
      service:
        name: nginx
        state: reloaded
    
    - name: Enable service on boot
      service:
        name: nginx
        enabled: yes
    
    - name: Disable service on boot
      service:
        name: apache2
        enabled: no
    
    - name: Start and enable service
      service:
        name: nginx
        state: started
        enabled: yes
    
    # Systemd Module - More control for systemd-based systems
    - name: Start service with systemd
      systemd:
        name: nginx
        state: started
        enabled: yes
    
    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
    
    - name: Mask a service (prevent it from being started)
      systemd:
        name: apache2
        masked: yes
    
    - name: Unmask a service
      systemd:
        name: apache2
        masked: no
    
    # Command Module - Run commands
    - name: Check service status with command
      command: systemctl status nginx
      register: service_status
      changed_when: false
      failed_when: false
    
    - name: Display service status
      debug:
        var: service_status.stdout_lines
    
    # Shell Module - Run shell commands (with pipes, redirects)
    - name: Check if service is running
      shell: systemctl is-active nginx
      register: nginx_status
      changed_when: false
      failed_when: false
    
    - name: Conditional task based on service status
      debug:
        msg: "Nginx is {{ nginx_status.stdout }}"
    
    # Service facts
    - name: Gather service facts
      service_facts:
    
    - name: Display nginx service info
      debug:
        msg: "Nginx state: {{ ansible_facts.services['nginx.service'].state | default('not found') }}"
      when: "'nginx.service' in ansible_facts.services"
    
    # Multiple services
    - name: Ensure multiple services are running
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - ssh
        - cron
      ignore_errors: yes
