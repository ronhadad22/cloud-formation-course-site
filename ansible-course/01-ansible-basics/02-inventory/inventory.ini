# Static Inventory File - INI Format
# This file defines the hosts and groups for your infrastructure

# Individual hosts can be listed without a group
# standalone.example.com

# Web Servers Group
[webservers]
web1.example.com ansible_host=192.168.1.10
web2.example.com ansible_host=192.168.1.11
web3.example.com ansible_host=192.168.1.12

# Database Servers Group
[databases]
db1.example.com ansible_host=192.168.1.20 ansible_port=22
db2.example.com ansible_host=192.168.1.21 ansible_port=22

# Load Balancers Group
[loadbalancers]
lb1.example.com ansible_host=192.168.1.30

# Application Servers Group
[appservers]
app1.example.com ansible_host=192.168.1.40
app2.example.com ansible_host=192.168.1.41

# Group of groups - Production environment
[production:children]
webservers
databases
loadbalancers
appservers

# Variables for all web servers
[webservers:vars]
http_port=80
https_port=443
max_clients=200

# Variables for all database servers
[databases:vars]
db_port=5432
db_engine=postgresql

# Variables for all production servers
[production:vars]
env=production
monitoring_enabled=true
backup_enabled=true

# Development environment
[development]
dev1.example.com ansible_host=192.168.2.10
dev2.example.com ansible_host=192.168.2.11

[development:vars]
env=development
monitoring_enabled=false
backup_enabled=false

# Variables that apply to all hosts
[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
