---
- name: Tags Examples
  hosts: all
  become: yes
  
  tasks:
    # Single tag
    - name: Install base packages
      apt:
        name:
          - vim
          - git
          - curl
        state: present
      tags:
        - packages
        - base
    
    # Multiple tags
    - name: Configure firewall
      ufw:
        rule: allow
        port: '22'
        proto: tcp
      tags:
        - security
        - firewall
        - network
    
    # Always tag - runs even with --skip-tags
    - name: Gather facts (always runs)
      setup:
      tags:
        - always
    
    # Never tag - only runs when explicitly called
    - name: Dangerous operation
      command: rm -rf /tmp/cache
      tags:
        - never
        - cleanup
    
    # Tagged block
    - name: Web server setup
      block:
        - name: Install nginx
          apt:
            name: nginx
            state: present
        
        - name: Start nginx
          service:
            name: nginx
            state: started
      tags:
        - webserver
        - nginx
    
    # Environment-specific tags
    - name: Install development tools
      apt:
        name:
          - build-essential
          - python3-dev
        state: present
      tags:
        - development
        - dev
    
    - name: Configure production monitoring
      debug:
        msg: "Setting up monitoring"
      tags:
        - production
        - monitoring
    
    # Service-specific tags
    - name: Database setup
      block:
        - name: Install PostgreSQL
          apt:
            name: postgresql
            state: present
        
        - name: Start PostgreSQL
          service:
            name: postgresql
            state: started
      tags:
        - database
        - postgresql
    
    # Configuration tags
    - name: Deploy application config
      template:
        src: app.conf.j2
        dest: /etc/myapp/app.conf
      tags:
        - configuration
        - config
        - deploy
    
    # Untagged task (runs by default)
    - name: Create log directory
      file:
        path: /var/log/myapp
        state: directory

---
# Usage examples:
# 
# Run only tasks with 'webserver' tag:
#   ansible-playbook tags-example.yml --tags webserver
# 
# Run multiple tags:
#   ansible-playbook tags-example.yml --tags "webserver,database"
# 
# Skip specific tags:
#   ansible-playbook tags-example.yml --skip-tags development
# 
# Run only 'never' tagged tasks:
#   ansible-playbook tags-example.yml --tags never
# 
# List all tags in playbook:
#   ansible-playbook tags-example.yml --list-tags
# 
# List all tasks:
#   ansible-playbook tags-example.yml --list-tasks
# 
# Run all except specific tags:
#   ansible-playbook tags-example.yml --skip-tags "development,cleanup"

- name: Role with Tags
  hosts: webservers
  become: yes
  
  roles:
    - role: webserver
      tags:
        - webserver
        - web
    
    - role: monitoring
      tags:
        - monitoring
        - observability

- name: Import/Include with Tags
  hosts: all
  become: yes
  
  tasks:
    - name: Import tasks with tags
      import_tasks: common-tasks.yml
      tags:
        - common
    
    - name: Include tasks with tags
      include_tasks: security-tasks.yml
      tags:
        - security
