---
# Ansible Vault Examples
# 
# To encrypt this file:
#   ansible-vault encrypt vault-example.yml
# 
# To decrypt:
#   ansible-vault decrypt vault-example.yml
# 
# To edit encrypted file:
#   ansible-vault edit vault-example.yml
# 
# To view encrypted file:
#   ansible-vault view vault-example.yml

- name: Using Ansible Vault
  hosts: all
  become: yes
  
  vars_files:
    - secrets.yml  # Encrypted file with sensitive data
  
  vars:
    # Inline encrypted variable (use ansible-vault encrypt_string)
    db_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          66386439653966653933383566363965613366663963363934316234656361653766653366373335
          3562643030386533393965653836636339653039343935650a626566653835633261373333383838
          34653330666234613563323666313936653432663665353333353961636534353232383364376234
          3731353030653465650a333765373561333634383432653830643930373631653237393737363332
          3739
  
  tasks:
    - name: Use encrypted variable
      debug:
        msg: "Database password is {{ db_password }}"
      no_log: true  # Don't log sensitive data
    
    - name: Use variable from encrypted file
      debug:
        msg: "API key is {{ api_key }}"
      no_log: true
    
    - name: Create configuration with secrets
      template:
        src: app-config.j2
        dest: /etc/myapp/config.yml
        mode: '0600'
      no_log: true

---
# Run playbook with vault password:
#   ansible-playbook vault-example.yml --ask-vault-pass
# 
# Or with password file:
#   ansible-playbook vault-example.yml --vault-password-file ~/.vault_pass
# 
# Or with multiple vault IDs:
#   ansible-playbook vault-example.yml --vault-id dev@~/.vault_pass_dev --vault-id prod@~/.vault_pass_prod
