---
# defaults file for webserver role

webserver_user: www-data
webserver_group: www-data
webserver_document_root: /var/www/html
webserver_site_name: default
webserver_remove_default_site: true

webserver_port: 80
webserver_server_name: "{{ ansible_fqdn }}"

webserver_worker_processes: auto
webserver_worker_connections: 1024
webserver_keepalive_timeout: 65

webserver_enable_ssl: false
webserver_ssl_cert: ""
webserver_ssl_key: ""

webserver_enable_gzip: true
webserver_gzip_types:
  - text/plain
  - text/css
  - application/json
  - application/javascript
  - text/xml
  - application/xml
