---
- name: Variables Examples
  hosts: webservers
  become: yes
  
  # Play-level variables
  vars:
    app_name: mywebapp
    app_port: 8080
    app_user: webapp
    app_directory: /opt/{{ app_name }}
    
    # List variable
    required_packages:
      - nginx
      - git
      - python3-pip
    
    # Dictionary variable
    database_config:
      host: db.example.com
      port: 5432
      name: production_db
      user: dbuser
  
  # Load variables from file
  vars_files:
    - vars/common.yml
    - vars/{{ env }}.yml
  
  tasks:
    - name: Display simple variable
      debug:
        msg: "Application name is {{ app_name }}"
    
    - name: Use variable in task
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'
    
    - name: Install packages from list
      apt:
        name: "{{ required_packages }}"
        state: present
    
    - name: Use dictionary variable
      debug:
        msg: "Database: {{ database_config.name }} at {{ database_config.host }}:{{ database_config.port }}"
    
    - name: Register command output
      command: hostname
      register: server_hostname
      changed_when: false
    
    - name: Use registered variable
      debug:
        msg: "Server hostname is {{ server_hostname.stdout }}"
    
    - name: Access inventory variables
      debug:
        msg: "This host is {{ inventory_hostname }} with IP {{ ansible_default_ipv4.address }}"
    
    - name: Use hostvars to access other host variables
      debug:
        msg: "First web server is {{ hostvars[groups['webservers'][0]]['inventory_hostname'] }}"
      run_once: true
    
    - name: Set fact (runtime variable)
      set_fact:
        deployment_time: "{{ ansible_date_time.iso8601 }}"
    
    - name: Use set_fact variable
      debug:
        msg: "Deployment started at {{ deployment_time }}"
    
    - name: Variable with default value
      debug:
        msg: "Environment is {{ env | default('development') }}"
    
    - name: Combine variables
      debug:
        msg: "Full path: {{ app_directory }}/{{ app_name }}"
    
    - name: Use environment variable
      debug:
        msg: "User running Ansible: {{ lookup('env', 'USER') }}"
