---
- name: Loops Examples
  hosts: all
  become: yes
  
  vars:
    users:
      - name: alice
        uid: 1001
        groups: ['sudo', 'developers']
      - name: bob
        uid: 1002
        groups: ['developers']
      - name: charlie
        uid: 1003
        groups: ['operators']
    
    packages:
      - vim
      - git
      - curl
      - htop
    
    services:
      - nginx
      - ssh
      - cron
    
    directories:
      - /opt/app1
      - /opt/app2
      - /var/log/apps
  
  tasks:
    # Simple loop over list
    - name: Install packages
      apt:
        name: "{{ item }}"
        state: present
      loop: "{{ packages }}"
      when: ansible_os_family == "Debian"
    
    # Loop over list of dictionaries
    - name: Create users
      user:
        name: "{{ item.name }}"
        uid: "{{ item.uid }}"
        groups: "{{ item.groups | join(',') }}"
        state: present
      loop: "{{ users }}"
    
    # Loop with index
    - name: Display items with index
      debug:
        msg: "Item {{ ansible_loop.index }}: {{ item }}"
      loop: "{{ packages }}"
    
    # Loop with custom label (cleaner output)
    - name: Create directories with label
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ directories }}"
      loop_control:
        label: "{{ item }}"
    
    # Loop over dictionary
    - name: Display dictionary items
      debug:
        msg: "Key: {{ item.key }}, Value: {{ item.value }}"
      loop: "{{ {'app1': 8080, 'app2': 8081, 'app3': 8082} | dict2items }}"
    
    # Loop with when condition
    - name: Start services conditionally
      service:
        name: "{{ item }}"
        state: started
      loop: "{{ services }}"
      when: item != "nginx" or "'webservers' in group_names"
      ignore_errors: yes
    
    # Nested loops (using subelements)
    - name: Add SSH keys for users
      authorized_key:
        user: "{{ item.0.name }}"
        key: "{{ item.1 }}"
      loop: "{{ users | subelements('ssh_keys', skip_missing=True) }}"
      when: item.0.ssh_keys is defined
    
    # Loop until condition is met
    - name: Wait for service to be ready
      uri:
        url: "http://localhost:80"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 5
      delay: 10
      ignore_errors: yes
    
    # Loop with pause between iterations
    - name: Restart services with delay
      service:
        name: "{{ item }}"
        state: restarted
      loop:
        - service1
        - service2
        - service3
      loop_control:
        pause: 5
      ignore_errors: yes
    
    # Loop over range
    - name: Create numbered directories
      file:
        path: "/tmp/dir{{ item }}"
        state: directory
      loop: "{{ range(1, 6) | list }}"
    
    # Loop over files in directory
    - name: Find log files
      find:
        paths: /var/log
        patterns: "*.log"
      register: log_files
    
    - name: Display log files
      debug:
        msg: "{{ item.path }}"
      loop: "{{ log_files.files }}"
      loop_control:
        label: "{{ item.path }}"
    
    # Loop with register
    - name: Check multiple URLs
      uri:
        url: "{{ item }}"
        method: GET
      loop:
        - https://www.google.com
        - https://www.github.com
      register: url_results
      ignore_errors: yes
    
    - name: Display URL check results
      debug:
        msg: "{{ item.item }} returned status {{ item.status | default('failed') }}"
      loop: "{{ url_results.results }}"
      loop_control:
        label: "{{ item.item }}"
    
    # Flatten nested lists
    - name: Loop over flattened list
      debug:
        msg: "{{ item }}"
      loop: "{{ [[1, 2], [3, 4], [5, 6]] | flatten }}"
    
    # Loop with complex filtering
    - name: Process only specific users
      debug:
        msg: "Processing user {{ item.name }}"
      loop: "{{ users }}"
      when: "'sudo' in item.groups"
    
    # Product loop (cartesian product)
    - name: Create combinations
      debug:
        msg: "Server: {{ item.0 }}, Port: {{ item.1 }}"
      loop: "{{ ['web1', 'web2'] | product([80, 443]) | list }}"
    
    # Batch processing
    - name: Process items in batches
      debug:
        msg: "Batch: {{ item }}"
      loop: "{{ packages | batch(2) | list }}"
    
    # Loop with first/last detection
    - name: Detect first and last items
      debug:
        msg: "Item: {{ item }} (First: {{ ansible_loop.first }}, Last: {{ ansible_loop.last }})"
      loop: "{{ packages }}"
