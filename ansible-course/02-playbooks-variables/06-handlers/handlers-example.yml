---
- name: Handlers Examples
  hosts: webservers
  become: yes
  
  vars:
    nginx_port: 80
    app_config_path: /etc/myapp/config.yml
  
  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
      notify: Start nginx
    
    - name: Copy nginx configuration
      copy:
        content: |
          server {
              listen {{ nginx_port }};
              server_name {{ inventory_hostname }};
              root /var/www/html;
              index index.html;
          }
        dest: /etc/nginx/sites-available/default
        mode: '0644'
      notify:
        - Validate nginx config
        - Reload nginx
    
    - name: Copy application configuration
      copy:
        content: |
          app:
            name: myapp
            port: 8080
            debug: false
        dest: "{{ app_config_path }}"
        mode: '0644'
      notify: Restart application
    
    - name: Update system packages
      apt:
        upgrade: dist
      notify: Reboot server
      tags:
        - never
        - upgrade
    
    - name: Modify sshd configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd
    
    - name: Install monitoring agent
      apt:
        name: monitoring-agent
        state: present
      notify:
        - Configure monitoring
        - Start monitoring
  
  handlers:
    # Basic handler
    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes
    
    # Handler that reloads service
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
    
    # Handler with validation
    - name: Validate nginx config
      command: nginx -t
      changed_when: false
    
    # Handler that restarts service
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
    
    # Handler for application
    - name: Restart application
      systemd:
        name: myapp
        state: restarted
      ignore_errors: yes
    
    # Handler for SSH
    - name: Restart sshd
      service:
        name: sshd
        state: restarted
    
    # Handler with notification chain
    - name: Configure monitoring
      copy:
        content: |
          monitoring:
            enabled: true
            interval: 60
        dest: /etc/monitoring/config.yml
    
    - name: Start monitoring
      service:
        name: monitoring-agent
        state: started
        enabled: yes
      ignore_errors: yes
    
    # Handler that requires reboot
    - name: Reboot server
      reboot:
        msg: "Reboot initiated by Ansible"
        reboot_timeout: 300
      when: ansible_virtualization_type != "docker"

---
# Example with listen directive
- name: Handlers with Listen
  hosts: webservers
  become: yes
  
  tasks:
    - name: Update web server config
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
      notify: Restart web services
    
    - name: Update application code
      git:
        repo: https://github.com/example/app.git
        dest: /opt/myapp
      notify: Restart web services
  
  handlers:
    # Multiple handlers listening to same notification
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
      listen: Restart web services
    
    - name: Clear cache
      file:
        path: /var/cache/myapp
        state: absent
      listen: Restart web services
    
    - name: Restart app service
      service:
        name: myapp
        state: restarted
      listen: Restart web services
      ignore_errors: yes

---
# Example with meta: flush_handlers
- name: Flush Handlers Example
  hosts: webservers
  become: yes
  
  tasks:
    - name: Update critical configuration
      copy:
        content: "critical_setting=true"
        dest: /etc/myapp/critical.conf
      notify: Restart application immediately
    
    # Force handlers to run now instead of at the end
    - name: Flush handlers
      meta: flush_handlers
    
    - name: Verify application is running
      uri:
        url: http://localhost:8080/health
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 3
      delay: 5
      ignore_errors: yes
    
    - name: Continue with other tasks
      debug:
        msg: "Application is healthy, continuing deployment"
  
  handlers:
    - name: Restart application immediately
      service:
        name: myapp
        state: restarted
      ignore_errors: yes
