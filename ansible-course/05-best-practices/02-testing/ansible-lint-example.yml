---
# Example playbook demonstrating ansible-lint best practices
# Run: ansible-lint ansible-lint-example.yml

- name: Well-Linted Playbook Example
  hosts: webservers
  become: true  # Use 'true' instead of 'yes'
  
  vars:
    package_list:
      - nginx
      - git
      - curl
  
  tasks:
    - name: Update apt cache  # Always name your tasks
      ansible.builtin.apt:  # Use FQCN (Fully Qualified Collection Name)
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      changed_when: false  # Explicit changed_when
    
    - name: Install packages
      ansible.builtin.apt:
        name: "{{ package_list }}"
        state: present
      when: ansible_os_family == "Debian"
    
    - name: Ensure nginx is started
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
    
    - name: Deploy configuration file
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'  # Explicit octal mode with quotes
        validate: nginx -t -c %s
        backup: true
      notify: Reload nginx
  
  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

---
# Common ansible-lint rules to follow:
# 
# 1. Always name tasks
# 2. Use FQCN for modules (ansible.builtin.*)
# 3. Use 'true/false' instead of 'yes/no'
# 4. Quote octal file modes
# 5. Avoid using shell when command works
# 6. Use package module for cross-platform
# 7. Set changed_when for command/shell
# 8. Use proper spacing and indentation
# 9. Avoid deprecated syntax
# 10. Use meaningful variable names
