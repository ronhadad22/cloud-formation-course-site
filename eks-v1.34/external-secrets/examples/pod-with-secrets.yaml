apiVersion: v1
kind: Pod
metadata:
  name: test-secrets-access
  namespace: default
spec:
  containers:
  - name: test-container
    image: alpine:latest
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo 'Secrets available:'; ls -la /secrets/; cat /secrets/config.json; sleep 30; done"]
    env:
    # Environment variables from secrets
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: jewlery-app-secrets
          key: JWT_SECRET
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: database-secrets
          key: DATABASE_URL
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: redis-secrets
          key: REDIS_URL
    
    # Mount secrets as files
    volumeMounts:
    - name: app-secrets
      mountPath: /secrets/app
      readOnly: true
    - name: db-secrets
      mountPath: /secrets/db
      readOnly: true
    - name: config-secrets
      mountPath: /secrets/config
      readOnly: true
  
  volumes:
  - name: app-secrets
    secret:
      secretName: jewlery-app-secrets
  - name: db-secrets
    secret:
      secretName: database-secrets
  - name: config-secrets
    secret:
      secretName: jewlery-app-config
  
  restartPolicy: Never
