AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  IRSA setup for External Secrets Operator (ESO) to access AWS Secrets Manager.
  Creates IAM role and policy for ESO to read secrets from Secrets Manager.

Parameters:
  ClusterName:
    Type: String
    Default: student-eks-cluster
    Description: Name of the EKS cluster
    
  ClusterRegion:
    Type: String
    Default: us-east-1
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
    Description: AWS region where the EKS cluster is deployed
    
  ServiceAccountName:
    Type: String
    Default: external-secrets
    Description: Name of the Kubernetes service account for ESO
    
  ServiceAccountNamespace:
    Type: String
    Default: external-secrets-system
    Description: Kubernetes namespace for ESO
    
  RoleName:
    Type: String
    Default: ExternalSecretsOperatorRole
    Description: Name of the IAM role for ESO
    
  PolicyName:
    Type: String
    Default: ExternalSecretsOperatorPolicy
    Description: Name of the IAM policy for Secrets Manager access

Resources:
  # Secrets Manager Access Policy
  ESOSecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: Policy for External Secrets Operator to access AWS Secrets Manager
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
              - secretsmanager:ListSecrets
            Resource: '*'
          - Effect: Allow
            Action:
              - kms:Decrypt
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService': !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'

  # IAM Role for Service Account
  ESORole:
    Type: AWS::IAM::Role
    DependsOn: GetOIDCProviderID
    Properties:
      RoleName: !Ref RoleName
      Description: IAM role for External Secrets Operator to access Secrets Manager via IRSA
      AssumeRolePolicyDocument: !Sub
        - |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/oidc.eks.${ClusterRegion}.amazonaws.com/id/${OIDCId}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "oidc.eks.${ClusterRegion}.amazonaws.com/id/${OIDCId}:sub": "system:serviceaccount:${ServiceAccountNamespace}:${ServiceAccountName}",
                    "oidc.eks.${ClusterRegion}.amazonaws.com/id/${OIDCId}:aud": "sts.amazonaws.com"
                  }
                }
              }
            ]
          }
        - OIDCId: !GetAtt GetOIDCProviderID.OIDCProviderID
      ManagedPolicyArns:
        - !Ref ESOSecretsManagerPolicy
      Tags:
        - Key: Purpose
          Value: External-Secrets-Operator
        - Key: Cluster
          Value: !Ref ClusterName
        - Key: ServiceAccount
          Value: !Sub '${ServiceAccountNamespace}/${ServiceAccountName}'

  # Custom resource to get OIDC Provider ID
  GetOIDCProviderID:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OIDCProviderFunction.Arn
      ClusterName: !Ref ClusterName
      Region: !Ref ClusterRegion

  # Lambda function to get OIDC Provider ID
  OIDCProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-get-oidc-provider'
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt OIDCProviderFunctionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  cluster_name = event['ResourceProperties']['ClusterName']
                  region = event['ResourceProperties']['Region']
                  
                  eks = boto3.client('eks', region_name=region)
                  response = eks.describe_cluster(name=cluster_name)
                  
                  oidc_issuer = response['cluster']['identity']['oidc']['issuer']
                  oidc_provider_id = oidc_issuer.split('/')[-1]
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'OIDCProviderID': oidc_provider_id,
                      'OIDCIssuer': oidc_issuer
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  # IAM Role for Lambda function
  OIDCProviderFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EKSDescribeCluster
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub 'arn:aws:eks:${ClusterRegion}:${AWS::AccountId}:cluster/${ClusterName}'

Outputs:
  RoleArn:
    Description: ARN of the IAM role for External Secrets Operator
    Value: !GetAtt ESORole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ESORole'
      
  PolicyArn:
    Description: ARN of the Secrets Manager access policy
    Value: !Ref ESOSecretsManagerPolicy
    Export:
      Name: !Sub '${AWS::StackName}-ESOPolicy'
      
  ServiceAccountAnnotation:
    Description: Annotation to add to the ESO service account
    Value: !Sub 'eks.amazonaws.com/role-arn=${ESORole.Arn}'
    Export:
      Name: !Sub '${AWS::StackName}-ServiceAccountAnnotation'
