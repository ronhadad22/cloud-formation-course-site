apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jewlery-app-secrets
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: jewlery-app-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .jwtSecret }}"
        API_KEY: "{{ .apiKey }}"
        ENCRYPTION_KEY: "{{ .encryptionKey }}"
        STRIPE_SECRET_KEY: "{{ .stripeSecret }}"
        STRIPE_PUBLISHABLE_KEY: "{{ .stripePublishable }}"
        EMAIL_PASSWORD: "{{ .emailPassword }}"
        OAUTH_CLIENT_SECRET: "{{ .oauthSecret }}"
  data:
  - secretKey: jwtSecret
    remoteRef:
      key: jewlery-app/auth
      property: jwt_secret
  - secretKey: apiKey
    remoteRef:
      key: jewlery-app/api
      property: api_key
  - secretKey: encryptionKey
    remoteRef:
      key: jewlery-app/encryption
      property: key
  - secretKey: stripeSecret
    remoteRef:
      key: jewlery-app/stripe
      property: secret_key
  - secretKey: stripePublishable
    remoteRef:
      key: jewlery-app/stripe
      property: publishable_key
  - secretKey: emailPassword
    remoteRef:
      key: jewlery-app/email
      property: password
  - secretKey: oauthSecret
    remoteRef:
      key: jewlery-app/oauth
      property: client_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jewlery-app-config
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: jewlery-app-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config.json: |
          {
            "database": {
              "host": "{{ .dbHost }}",
              "port": {{ .dbPort }},
              "name": "{{ .dbName }}"
            },
            "redis": {
              "host": "{{ .redisHost }}",
              "port": {{ .redisPort }}
            },
            "stripe": {
              "publishable_key": "{{ .stripePublishable }}"
            },
            "features": {
              "email_notifications": {{ .emailEnabled }},
              "payment_processing": {{ .paymentEnabled }}
            }
          }
  data:
  - secretKey: dbHost
    remoteRef:
      key: jewlery-app/config
      property: db_host
  - secretKey: dbPort
    remoteRef:
      key: jewlery-app/config
      property: db_port
  - secretKey: dbName
    remoteRef:
      key: jewlery-app/config
      property: db_name
  - secretKey: redisHost
    remoteRef:
      key: jewlery-app/config
      property: redis_host
  - secretKey: redisPort
    remoteRef:
      key: jewlery-app/config
      property: redis_port
  - secretKey: stripePublishable
    remoteRef:
      key: jewlery-app/stripe
      property: publishable_key
  - secretKey: emailEnabled
    remoteRef:
      key: jewlery-app/config
      property: email_enabled
  - secretKey: paymentEnabled
    remoteRef:
      key: jewlery-app/config
      property: payment_enabled
