apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-secrets
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: jenkins-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-password: "{{ .adminPassword }}"
        github-token: "{{ .githubToken }}"
        docker-registry-password: "{{ .dockerPassword }}"
  data:
  - secretKey: adminPassword
    remoteRef:
      key: jenkins/admin
      property: password
  - secretKey: githubToken
    remoteRef:
      key: jenkins/github
      property: token
  - secretKey: dockerPassword
    remoteRef:
      key: jenkins/docker
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jenkins-ecr-credentials
  namespace: jenkins
spec:
  refreshInterval: 30m
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: jenkins-ecr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .ecrRegistry }}": {
                "username": "AWS",
                "password": "{{ .ecrToken }}"
              }
            }
          }
  data:
  - secretKey: ecrRegistry
    remoteRef:
      key: jenkins/ecr
      property: registry
  - secretKey: ecrToken
    remoteRef:
      key: jenkins/ecr
      property: token
