apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: database-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DB_HOST: "{{ .host }}"
        DB_PORT: "{{ .port }}"
        DB_NAME: "{{ .database }}"
        DB_USERNAME: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}"
  data:
  - secretKey: host
    remoteRef:
      key: rds/postgres
      property: host
  - secretKey: port
    remoteRef:
      key: rds/postgres
      property: port
  - secretKey: database
    remoteRef:
      key: rds/postgres
      property: dbname
  - secretKey: username
    remoteRef:
      key: rds/postgres
      property: username
  - secretKey: password
    remoteRef:
      key: rds/postgres
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager-cluster
    kind: ClusterSecretStore
  target:
    name: redis-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        REDIS_HOST: "{{ .host }}"
        REDIS_PORT: "{{ .port }}"
        REDIS_PASSWORD: "{{ .password }}"
        REDIS_URL: "redis://:{{ .password }}@{{ .host }}:{{ .port }}"
  data:
  - secretKey: host
    remoteRef:
      key: elasticache/redis
      property: host
  - secretKey: port
    remoteRef:
      key: elasticache/redis
      property: port
  - secretKey: password
    remoteRef:
      key: elasticache/redis
      property: password
