apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      The 'latest' tag is mutable and can lead to unexpected errors if the
      image changes. Requires a specific image tag to be specified.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Using 'latest' tag is not allowed. Please specify a specific image tag."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
    - name: require-image-tag-initcontainers
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Using 'latest' tag is not allowed in init containers. Please specify a specific image tag."
        pattern:
          spec:
            =(initContainers):
              - image: "!*:latest"
