# Kyverno Helm Chart Values

# Replica count for high availability
replicaCount: 2

# Resource limits
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Image configuration
image:
  repository: ghcr.io/kyverno/kyverno
  tag: v1.12.0
  pullPolicy: IfNotPresent

# Admission controller configuration
admissionController:
  replicas: 2
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Background controller configuration
backgroundController:
  enabled: true
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Cleanup controller configuration
cleanupController:
  enabled: true
  replicas: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Reports controller configuration
reportsController:
  enabled: true
  replicas: 1
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Features
features:
  admissionReports:
    enabled: true
  backgroundScan:
    enabled: true
  policyExceptions:
    enabled: true
  configMapCaching:
    enabled: true
  dumpPayload:
    enabled: false
  logging:
    format: text
    verbosity: 2

# Webhooks configuration
webhooksCleanup:
  enabled: true

# Service monitor for Prometheus (if using)
serviceMonitor:
  enabled: false

# Pod security standards
podSecurityStandard: restricted

# Tolerations for system nodes
tolerations:
  - key: "CriticalAddonsOnly"
    operator: "Exists"
    effect: "NoSchedule"

# Anti-affinity for high availability
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - kyverno
          topologyKey: kubernetes.io/hostname
