AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  IRSA (IAM Roles for Service Accounts) setup for AWS Load Balancer Controller.
  Creates IAM role and policy for the controller to manage ALB/NLB resources.

Parameters:
  ClusterName:
    Type: String
    Default: student-eks-cluster
    Description: Name of the EKS cluster
    
  ClusterRegion:
    Type: String
    Default: us-east-1
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-northeast-1
    Description: AWS region where the EKS cluster is deployed
    
  ServiceAccountName:
    Type: String
    Default: aws-load-balancer-controller
    Description: Name of the Kubernetes service account
    
  ServiceAccountNamespace:
    Type: String
    Default: kube-system
    Description: Kubernetes namespace for the service account
    
  RoleName:
    Type: String
    Default: AWSLoadBalancerControllerRole
    Description: Name of the IAM role for AWS Load Balancer Controller
    
  PolicyName:
    Type: String
    Default: AWSLoadBalancerControllerPolicy
    Description: Name of the IAM policy for AWS Load Balancer Controller permissions

Resources:
  # AWS Load Balancer Controller Policy
  LoadBalancerControllerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: Policy for AWS Load Balancer Controller to manage ALB/NLB resources
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: '*'
            Condition:
              StringEquals:
                iam:AWSServiceName: elasticloadbalancing.amazonaws.com
          - Effect: Allow
            Action:
              - ec2:DescribeAccountAttributes
              - ec2:DescribeAddresses
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeInternetGateways
              - ec2:DescribeVpcs
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeInstances
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeTags
              - ec2:GetCoipPoolUsage
              - ec2:DescribeCoipPools
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeLoadBalancerAttributes
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeListenerCertificates
              - elasticloadbalancing:DescribeSSLPolicies
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeTargetGroupAttributes
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:DescribeTags
            Resource: '*'
          - Effect: Allow
            Action:
              - cognito-idp:DescribeUserPoolClient
              - acm:ListCertificates
              - acm:DescribeCertificate
              - iam:ListServerCertificates
              - iam:GetServerCertificate
              - waf-regional:GetWebACL
              - waf-regional:GetWebACLForResource
              - waf-regional:AssociateWebACL
              - waf-regional:DisassociateWebACL
              - wafv2:GetWebACL
              - wafv2:GetWebACLForResource
              - wafv2:AssociateWebACL
              - wafv2:DisassociateWebACL
              - shield:GetSubscriptionState
              - shield:DescribeProtection
              - shield:CreateProtection
              - shield:DeleteProtection
            Resource: '*'
          - Effect: Allow
            Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
            Resource: '*'
          - Effect: Allow
            Action:
              - ec2:CreateSecurityGroup
            Resource: '*'
          - Effect: Allow
            Action:
              - ec2:CreateTags
            Resource: arn:aws:ec2:*:*:security-group/*
            Condition:
              StringEquals:
                ec2:CreateAction: CreateSecurityGroup
              'Null':
                aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: arn:aws:ec2:*:*:security-group/*
            Condition:
              'Null':
                aws:RequestTag/elbv2.k8s.aws/cluster: 'true'
                aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:DeleteSecurityGroup
            Resource: '*'
            Condition:
              'Null':
                aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - elasticloadbalancing:CreateLoadBalancer
              - elasticloadbalancing:CreateTargetGroup
            Resource: '*'
            Condition:
              'Null':
                aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - elasticloadbalancing:CreateListener
              - elasticloadbalancing:DeleteListener
              - elasticloadbalancing:CreateRule
              - elasticloadbalancing:DeleteRule
            Resource: '*'
          - Effect: Allow
            Action:
              - elasticloadbalancing:AddListenerCertificates
              - elasticloadbalancing:RemoveListenerCertificates
              - elasticloadbalancing:ModifyListener
            Resource: '*'
          - Effect: Allow
            Action:
              - elasticloadbalancing:ModifyLoadBalancerAttributes
              - elasticloadbalancing:SetIpAddressType
              - elasticloadbalancing:SetSecurityGroups
              - elasticloadbalancing:SetSubnets
              - elasticloadbalancing:DeleteLoadBalancer
              - elasticloadbalancing:ModifyTargetGroup
              - elasticloadbalancing:ModifyTargetGroupAttributes
              - elasticloadbalancing:DeleteTargetGroup
            Resource: '*'
            Condition:
              'Null':
                aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
            Resource:
              - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
              - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
            Condition:
              'Null':
                aws:RequestTag/elbv2.k8s.aws/cluster: 'false'
                aws:ResourceTag/elbv2.k8s.aws/cluster: 'false'
          - Effect: Allow
            Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
            Resource:
              - arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener/app/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener-rule/net/*/*/*
              - arn:aws:elasticloadbalancing:*:*:listener-rule/app/*/*/*
          - Effect: Allow
            Action:
              - elasticloadbalancing:RegisterTargets
              - elasticloadbalancing:DeregisterTargets
            Resource: arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
          - Effect: Allow
            Action:
              - elasticloadbalancing:SetWebAcl
              - elasticloadbalancing:ModifyListener
              - elasticloadbalancing:AddListenerCertificates
              - elasticloadbalancing:RemoveListenerCertificates
              - elasticloadbalancing:ModifyRule
            Resource: '*'
          - Effect: Allow
            Action:
              - elasticloadbalancing:DescribeListenerAttributes
              - elasticloadbalancing:ModifyListenerAttributes
            Resource: '*'

  # IAM Role for Service Account
  LoadBalancerControllerRole:
    Type: AWS::IAM::Role
    DependsOn: GetOIDCProviderID
    Properties:
      RoleName: !Ref RoleName
      Description: IAM role for AWS Load Balancer Controller via IRSA
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}:sub": "system:serviceaccount:${ServiceAccountNamespace}:${ServiceAccountName}",
                  "oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}:aud": "sts.amazonaws.com"
                }
              }
            }
          ]
        }
      ManagedPolicyArns:
        - !Ref LoadBalancerControllerPolicy
      Tags:
        - Key: Purpose
          Value: AWS-Load-Balancer-Controller
        - Key: Cluster
          Value: !Ref ClusterName
        - Key: ServiceAccount
          Value: !Sub '${ServiceAccountNamespace}/${ServiceAccountName}'

  # Custom resource to get OIDC Provider ID
  GetOIDCProviderID:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OIDCProviderFunction.Arn
      ClusterName: !Ref ClusterName
      Region: !Ref ClusterRegion

  # Lambda function to get OIDC Provider ID
  OIDCProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-get-oidc-provider'
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt OIDCProviderFunctionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  cluster_name = event['ResourceProperties']['ClusterName']
                  region = event['ResourceProperties']['Region']
                  
                  eks = boto3.client('eks', region_name=region)
                  response = eks.describe_cluster(name=cluster_name)
                  
                  oidc_issuer = response['cluster']['identity']['oidc']['issuer']
                  oidc_provider_id = oidc_issuer.split('/')[-1]
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'OIDCProviderID': oidc_provider_id,
                      'OIDCIssuer': oidc_issuer
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  # IAM Role for Lambda function
  OIDCProviderFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EKSDescribeCluster
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub 'arn:aws:eks:${ClusterRegion}:${AWS::AccountId}:cluster/${ClusterName}'

Outputs:
  RoleArn:
    Description: ARN of the IAM role for AWS Load Balancer Controller
    Value: !GetAtt LoadBalancerControllerRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerControllerRoleArn'
      
  PolicyArn:
    Description: ARN of the AWS Load Balancer Controller policy
    Value: !Ref LoadBalancerControllerPolicy
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerControllerPolicyArn'
      
  ServiceAccountAnnotation:
    Description: Annotation to add to the Kubernetes service account
    Value: !Sub 'eks.amazonaws.com/role-arn=${LoadBalancerControllerRole.Arn}'
    Export:
      Name: !Sub '${AWS::StackName}-ServiceAccountAnnotation'
      
  OIDCProviderID:
    Description: OIDC Provider ID for the EKS cluster
    Value: !GetAtt GetOIDCProviderID.OIDCProviderID
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderID'
