---
# ServiceMonitor for Jenkins metrics
# Scrapes Jenkins Prometheus metrics from /prometheus/ endpoint
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jenkins-metrics
  namespace: monitoring
  labels:
    release: prometheus
spec:
  # Monitor Jenkins service in jenkins namespace
  namespaceSelector:
    matchNames:
    - jenkins
  
  # Select Jenkins service
  selector:
    matchLabels:
      app.kubernetes.io/component: jenkins-controller
  
  # Scrape configuration
  endpoints:
  - port: http
    interval: 30s
    path: /prometheus/
    scheme: http
