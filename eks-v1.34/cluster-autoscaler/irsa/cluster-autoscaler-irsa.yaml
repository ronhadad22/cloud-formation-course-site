AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  IRSA (IAM Roles for Service Accounts) setup for Cluster Autoscaler.
  Creates IAM role and policy for Cluster Autoscaler to manage Auto Scaling Groups.

Parameters:
  ClusterName:
    Type: String
    Default: student-eks-cluster
    Description: Name of the EKS cluster
    
  ClusterRegion:
    Type: String
    Default: us-east-2
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-northeast-1
    Description: AWS region where the EKS cluster is deployed
    
  ServiceAccountName:
    Type: String
    Default: cluster-autoscaler
    Description: Name of the Kubernetes service account
    
  ServiceAccountNamespace:
    Type: String
    Default: kube-system
    Description: Kubernetes namespace for the service account
    
  RoleName:
    Type: String
    Default: ClusterAutoscalerRole
    Description: Name of the IAM role for Cluster Autoscaler
    
  PolicyName:
    Type: String
    Default: ClusterAutoscalerPolicy-v2
    Description: Name of the IAM policy for Cluster Autoscaler permissions

Resources:
  # Cluster Autoscaler Policy
  ClusterAutoscalerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Ref PolicyName
      Description: Policy for Cluster Autoscaler to manage Auto Scaling Groups
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - autoscaling:DescribeAutoScalingGroups
              - autoscaling:DescribeAutoScalingInstances
              - autoscaling:DescribeLaunchConfigurations
              - autoscaling:DescribeScalingActivities
              - autoscaling:DescribeTags
              - ec2:DescribeInstanceTypes
              - ec2:DescribeLaunchTemplateVersions
            Resource: '*'
          - Effect: Allow
            Action:
              - autoscaling:SetDesiredCapacity
              - autoscaling:TerminateInstanceInAutoScalingGroup
              - ec2:DescribeImages
              - ec2:GetInstanceTypesFromInstanceRequirements
              - eks:DescribeNodegroup
            Resource: '*'

  # IAM Role for Service Account
  ClusterAutoscalerRole:
    Type: AWS::IAM::Role
    DependsOn: GetOIDCProviderID
    Properties:
      RoleName: !Ref RoleName
      Description: IAM role for Cluster Autoscaler via IRSA
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}:sub": "system:serviceaccount:${ServiceAccountNamespace}:${ServiceAccountName}",
                  "oidc.eks.${ClusterRegion}.amazonaws.com/id/${GetOIDCProviderID.OIDCProviderID}:aud": "sts.amazonaws.com"
                }
              }
            }
          ]
        }
      ManagedPolicyArns:
        - !Ref ClusterAutoscalerPolicy
      Tags:
        - Key: Purpose
          Value: Cluster-Autoscaler
        - Key: Cluster
          Value: !Ref ClusterName
        - Key: ServiceAccount
          Value: !Sub '${ServiceAccountNamespace}/${ServiceAccountName}'

  # Custom resource to get OIDC Provider ID
  GetOIDCProviderID:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt OIDCProviderFunction.Arn
      ClusterName: !Ref ClusterName
      Region: !Ref ClusterRegion

  # Lambda function to get OIDC Provider ID
  OIDCProviderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-get-oidc-provider'
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt OIDCProviderFunctionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  cluster_name = event['ResourceProperties']['ClusterName']
                  region = event['ResourceProperties']['Region']
                  
                  eks = boto3.client('eks', region_name=region)
                  response = eks.describe_cluster(name=cluster_name)
                  
                  oidc_issuer = response['cluster']['identity']['oidc']['issuer']
                  oidc_provider_id = oidc_issuer.split('/')[-1]
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'OIDCProviderID': oidc_provider_id,
                      'OIDCIssuer': oidc_issuer
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  # IAM Role for Lambda function
  OIDCProviderFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EKSDescribeCluster
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: !Sub 'arn:aws:eks:${ClusterRegion}:${AWS::AccountId}:cluster/${ClusterName}'

Outputs:
  RoleArn:
    Description: ARN of the IAM role for Cluster Autoscaler
    Value: !GetAtt ClusterAutoscalerRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ClusterAutoscalerRoleArn'
      
  PolicyArn:
    Description: ARN of the Cluster Autoscaler policy
    Value: !Ref ClusterAutoscalerPolicy
    Export:
      Name: !Sub '${AWS::StackName}-ClusterAutoscalerPolicyArn'
      
  ServiceAccountAnnotation:
    Description: Annotation to add to the Kubernetes service account
    Value: !Sub 'eks.amazonaws.com/role-arn=${ClusterAutoscalerRole.Arn}'
    Export:
      Name: !Sub '${AWS::StackName}-ServiceAccountAnnotation'
      
  OIDCProviderID:
    Description: OIDC Provider ID for the EKS cluster
    Value: !GetAtt GetOIDCProviderID.OIDCProviderID
    Export:
      Name: !Sub '${AWS::StackName}-OIDCProviderID'
