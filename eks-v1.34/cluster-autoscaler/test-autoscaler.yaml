---
apiVersion: v1
kind: Namespace
metadata:
  name: autoscaler-test

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-test-deployment
  namespace: autoscaler-test
  labels:
    app: autoscaler-test
spec:
  replicas: 10
  selector:
    matchLabels:
      app: autoscaler-test
  template:
    metadata:
      labels:
        app: autoscaler-test
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 80
