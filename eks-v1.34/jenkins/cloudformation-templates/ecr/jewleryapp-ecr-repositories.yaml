AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  ECR repositories for Jewelry App Jenkins CI/CD pipelines.
  Creates ECR repositories: jewleryapp/auth, jewleryapp/be, jewleryapp/fe

Parameters:
  ProjectName:
    Type: String
    Default: jewleryapp
    Description: Name of the project (used as prefix for repositories)
    
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
    
  EnableImageScanning:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable image vulnerability scanning
    
  ImageTagMutability:
    Type: String
    Default: MUTABLE
    AllowedValues:
      - MUTABLE
      - IMMUTABLE
    Description: Image tag mutability setting
    
  LifecyclePolicyDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: Number of days to keep untagged images

Resources:
  # ECR Repository for auth service
  AuthRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/auth'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: auth

  # ECR Repository for backend service
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/be'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: be

  # ECR Repository for frontend service
  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/fe'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: fe

Outputs:
  AuthRepositoryURI:
    Description: URI of the auth ECR repository
    Value: !GetAtt AuthRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-AuthRepositoryURI'
      
  BackendRepositoryURI:
    Description: URI of the backend ECR repository
    Value: !GetAtt BackendRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-BackendRepositoryURI'
      
  FrontendRepositoryURI:
    Description: URI of the frontend ECR repository
    Value: !GetAtt FrontendRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-FrontendRepositoryURI'
      
  RepositoryList:
    Description: List of all ECR repository URIs
    Value: !Sub 
      - '${Auth},${Backend},${Frontend}'
      - Auth: !GetAtt AuthRepository.RepositoryUri
        Backend: !GetAtt BackendRepository.RepositoryUri
        Frontend: !GetAtt FrontendRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-AllRepositoryURIs'
      
  ECRRegistry:
    Description: ECR Registry URL
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-ECRRegistry'
