AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  ECR repositories for Jenkins CI/CD pipelines.
  Creates ECR repositories with lifecycle policies and proper tagging.

Parameters:
  ProjectName:
    Type: String
    Default: jewleryapp
    Description: Name of the project (used as prefix for repositories)
    
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
    
  RepositoryNames:
    Type: CommaDelimitedList
    Default: "auth,be,fe"
    Description: List of repository names to create (comma-separated)
    
  EnableImageScanning:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable image vulnerability scanning
    
  ImageTagMutability:
    Type: String
    Default: MUTABLE
    AllowedValues:
      - MUTABLE
      - IMMUTABLE
    Description: Image tag mutability setting
    
  LifecyclePolicyDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: Number of days to keep untagged images

Resources:
  # ECR Repository for auth service
  AuthRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/auth-service'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: auth-service

  # ECR Repository for frontend
  FrontendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/frontend'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: frontend

  # ECR Repository for backend
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/backend'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: backend

  # ECR Repository for api-gateway
  ApiGatewayRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/api-gateway'
      ImageScanningConfiguration:
        ScanOnPush: !Ref EnableImageScanning
      ImageTagMutability: !Ref ImageTagMutability
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images older than ${LifecyclePolicyDays} days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": ${LifecyclePolicyDays}
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Jenkins-CI-CD
        - Key: Repository
          Value: api-gateway

Outputs:
  SampleAppRepositoryURI:
    Description: URI of the sample-app ECR repository
    Value: !GetAtt SampleAppRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-SampleAppRepositoryURI'
      
  AuthServiceRepositoryURI:
    Description: URI of the auth-service ECR repository
    Value: !GetAtt AuthServiceRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-AuthServiceRepositoryURI'
      
  FrontendRepositoryURI:
    Description: URI of the frontend ECR repository
    Value: !GetAtt FrontendRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-FrontendRepositoryURI'
      
  BackendRepositoryURI:
    Description: URI of the backend ECR repository
    Value: !GetAtt BackendRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-BackendRepositoryURI'
      
  ApiGatewayRepositoryURI:
    Description: URI of the api-gateway ECR repository
    Value: !GetAtt ApiGatewayRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayRepositoryURI'
      
  RepositoryList:
    Description: List of all ECR repository URIs
    Value: !Sub 
      - '${SampleApp},${AuthService},${Frontend},${Backend},${ApiGateway}'
      - SampleApp: !GetAtt SampleAppRepository.RepositoryUri
        AuthService: !GetAtt AuthServiceRepository.RepositoryUri
        Frontend: !GetAtt FrontendRepository.RepositoryUri
        Backend: !GetAtt BackendRepository.RepositoryUri
        ApiGateway: !GetAtt ApiGatewayRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-AllRepositoryURIs'
