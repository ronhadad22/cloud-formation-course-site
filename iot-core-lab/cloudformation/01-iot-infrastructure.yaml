AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IoT Core Lab — IoT Thing, Policy, Topic Rule that routes device messages to S3.
  Certificates must be created separately via CLI (cannot be done in CloudFormation).

Parameters:
  BucketNameSuffix:
    Type: String
    Default: iot-lab-data
    Description: Suffix for the S3 bucket name (will be prefixed with account ID)

  ThingName:
    Type: String
    Default: temperature-sensor-01
    Description: Name of the IoT Thing

  TopicFilter:
    Type: String
    Default: devices/+/data
    Description: MQTT topic filter for the IoT Rule

Resources:
  # ============================================================
  # S3 Bucket for device data
  # ============================================================
  DeviceDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${BucketNameSuffix}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldData
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Lab
          Value: iot-core

  # ============================================================
  # IoT Thing
  # ============================================================
  IoTThing:
    Type: AWS::IoT::Thing
    Properties:
      ThingName: !Ref ThingName
      AttributePayload:
        Attributes:
          type: temperature-sensor
          location: lab-room-1

  # ============================================================
  # IoT Policy (allows connect, publish, subscribe)
  # ============================================================
  IoTPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: iot-lab-device-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iot:Connect
            Resource: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:client/${ThingName}"
          - Effect: Allow
            Action:
              - iot:Publish
            Resource:
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/devices/${ThingName}/data"
              - !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/devices/${ThingName}/upload-request"
          - Effect: Allow
            Action:
              - iot:Subscribe
            Resource: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/devices/${ThingName}/*"
          - Effect: Allow
            Action:
              - iot:Receive
            Resource: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/devices/${ThingName}/*"

  # ============================================================
  # IAM Role for IoT Rule → S3
  # ============================================================
  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: iot-lab-rule-s3-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: iot-s3-put
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${DeviceDataBucket.Arn}/*"

  # ============================================================
  # Lambda IAM Role — for presigned URL generator
  # ============================================================
  PresignedUrlLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: iot-lab-presigned-url-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: s3-presign-and-iot-publish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${DeviceDataBucket.Arn}/uploads/*"
              - Effect: Allow
                Action:
                  - iot:Publish
                Resource: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/devices/*/upload-response"

  # ============================================================
  # Lambda — Generate presigned S3 PUT URL
  # ============================================================
  PresignedUrlLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: iot-lab-presigned-url
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt PresignedUrlLambdaRole.Arn
      Environment:
        Variables:
          S3_BUCKET: !Ref DeviceDataBucket
          URL_EXPIRATION: '300'
      Code:
        ZipFile: |
          import json, os, uuid, boto3
          from botocore.config import Config
          from datetime import datetime, timezone

          s3 = boto3.client('s3', config=Config(s3={'addressing_style': 'virtual'}, signature_version='s3v4'))
          iot = boto3.client('iot-data')
          BUCKET = os.environ['S3_BUCKET']
          EXPIRY = int(os.environ.get('URL_EXPIRATION', '300'))

          def handler(event, context):
              print(f'Event: {json.dumps(event)}')
              device_id = event.get('device_id', 'unknown')
              filename = event.get('filename', f'{uuid.uuid4().hex}.dat')
              content_type = event.get('content_type', 'application/octet-stream')
              date_prefix = datetime.now(timezone.utc).strftime('%Y-%m-%d')
              s3_key = f'uploads/{device_id}/{date_prefix}/{filename}'

              url = s3.generate_presigned_url('put_object', Params={
                  'Bucket': BUCKET, 'Key': s3_key, 'ContentType': content_type,
              }, ExpiresIn=EXPIRY)

              resp = {
                  'request_id': event.get('request_id', uuid.uuid4().hex),
                  'device_id': device_id,
                  'presigned_url': url,
                  's3_bucket': BUCKET,
                  's3_key': s3_key,
                  'content_type': content_type,
                  'expires_in': EXPIRY,
                  'timestamp': datetime.now(timezone.utc).isoformat(),
              }

              topic = f'devices/{device_id}/upload-response'
              iot.publish(topic=topic, qos=1, payload=json.dumps(resp))
              print(f'Published presigned URL to {topic}')
              return resp

  # Permission for IoT to invoke Lambda
  PresignedUrlLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PresignedUrlLambda.Arn
      Action: lambda:InvokeFunction
      Principal: iot.amazonaws.com
      SourceArn: !Sub "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:rule/iot_lab_presigned_url"

  # ============================================================
  # IoT Topic Rule — upload-request triggers Lambda
  # ============================================================
  IoTUploadRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: iot_lab_presigned_url
      TopicRulePayload:
        Description: When device requests upload, trigger Lambda to generate presigned S3 URL
        Sql: "SELECT *, topic(2) as device_id FROM 'devices/+/upload-request'"
        AwsIotSqlVersion: '2016-03-23'
        RuleDisabled: false
        Actions:
          - Lambda:
              FunctionArn: !GetAtt PresignedUrlLambda.Arn

  # ============================================================
  # IoT Topic Rule — routes MQTT messages to S3
  # ============================================================
  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: iot_lab_to_s3
      TopicRulePayload:
        Description: Route device data messages to S3 bucket
        Sql: !Sub "SELECT *, topic() as mqtt_topic, timestamp() as received_at FROM '${TopicFilter}'"
        AwsIotSqlVersion: '2016-03-23'
        RuleDisabled: false
        Actions:
          - S3:
              BucketName: !Ref DeviceDataBucket
              Key: "devices/${topic(2)}/${timestamp()}.json"
              RoleArn: !GetAtt IoTRuleRole.Arn

Outputs:
  ThingName:
    Description: IoT Thing name
    Value: !Ref ThingName

  IoTPolicyName:
    Description: IoT Policy name to attach to certificates
    Value: !Ref IoTPolicy

  S3BucketName:
    Description: S3 bucket for device data
    Value: !Ref DeviceDataBucket

  S3BucketArn:
    Description: S3 bucket ARN
    Value: !GetAtt DeviceDataBucket.Arn

  IoTRuleName:
    Description: IoT Topic Rule name
    Value: iot_lab_to_s3

  TopicFilter:
    Description: MQTT topic filter
    Value: !Ref TopicFilter

  IoTEndpoint:
    Description: Run 'aws iot describe-endpoint --endpoint-type iot:Data-ATS' to get your endpoint
    Value: "See CLI command in description"

  PresignedUrlLambdaArn:
    Description: Lambda function for presigned URL generation
    Value: !GetAtt PresignedUrlLambda.Arn

  UploadRequestTopic:
    Description: MQTT topic for upload requests
    Value: !Sub "devices/${ThingName}/upload-request"

  UploadResponseTopic:
    Description: MQTT topic for upload responses (presigned URL)
    Value: !Sub "devices/${ThingName}/upload-response"
